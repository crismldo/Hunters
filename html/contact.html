<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfhunt</title>
    <link rel="stylesheet" href="../css/contact.css">
    <link rel="stylesheet" href="../css/nav-bar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="icon" href="../images/wolfLogo.png">
</head>
<body>

    <div id="navbar"></div>

    <section class="contact">
        <div class="container">
            <div class="contact-content">
                <div class="contact-img">
                    <img class="hero_image" src="../images/6.png" alt="hero_image">
                </div>
                <div class="contact-text">
                    <h3>Drop us a line!</h3>
                    <p>¿Tienes preguntas sobre Wolfhunt? Nos encantaría saber de ti. Envíanos un correo electrónico y te responderemos lo antes posible.</p>
                    <a class="contact-email-link" href="mailto:contact@wolfhunt.com">Send us an email</a>
                </div>
            </div>
        </div>
    </section>

    <section class="footer">
        <div class="container">
            <section class="footer-content">
                <div class="foot-text">Wolfhunt</div>
                <div class="foot-follow">
                    <div id="follow">Follow us</div>
                    <img src="../images/insta_logo.png" id="insta" onclick="redirectInsta()" alt="insta">
                </div>
            </section>
        </div>
    </section>

    <script src="../js/contact.js"></script>
    <script src="../js/nav-bar.js"></script>
    <script src="../js/footer.js"></script>
</body>
</html>
