<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfhunt</title>
    <link rel="stylesheet" href="../css/team.css">
    <link rel="stylesheet" href="../css/nav-bar.css">
    <link rel="stylesheet" href="../css/footer.css">
</head>
<body>

<div id="navbar"></div>

    <section class="hero">
        <div class="hero-content">
            <img class="hero_image" src="../images/hero_valen.PNG" alt="hero_image porque yo lo digo">
        </div>
    </section>

     <section class="team">
    <div class="container">
        <h2 class="team-title">THE TEAM</h2>

        <div class="team-content">

            <div class="team_member">
                    <img src="../images/team_cris.jpeg" alt="Teammate 1" class="profile-img">

                    <div class="info-row">
                        <h3 class="nickname">Cristina Rebollozo</h3>

                    <div class="socials">
                        <img src="../images" id="insta" onclick="InstaCris()" alt="insta">
                        <img src="../images" id="linked" onclick="LinkedCris()" alt="linkedin">
                    </div>
                </div>
            </div>

            <div class="team_member">
                    <img src="../images/team_pripri.jpg" alt="Teammate 1" class="profile-img">

                    <div class="info-row">
                        <h3 class="nickname">Prisila Luna</h3>

                    <div class="socials">
                        <img src="../images" id="insta" onclick="InstaPris()" alt="insta">
                        <img src="../images" id="linked" onclick="LinkedPris()" alt="linkedin">
                    </div>
                </div>
            </div>

            <div class="team_member">
                    <img src="../images/team_stacy.jpeg" alt="Teammate 1" class="profile-img">

                    <div class="info-row">
                        <h3 class="nickname">Stacy Chapa</h3>

                    <div class="socials">
                        <img src="../images" id="insta" onclick="InstaStacy()" alt="insta">
                        <img src="../images" id="linked" onclick="LinkedStacy()" alt="linkedin">
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>


    <section class="footer">
        <div class="container">
            <section class="footer-content">
                <div class="foot-text">Wolfhunt</div>
                <div class="foot-follow">
                    <div id="follow">Follow us</div>
                    <img src="../images" id="insta" onclick="redirectInsta()" alt="insta">
                </div>
            </section>
        </div>
    </section>

    <script src="../js/team.js"></script>
    <script src="../js/nav-bar.js"></script>
    <script src="../js/footer.js"></script>
</body>
</html>
